name: Deploy Client to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish Blazor client
        run: dotnet publish PWAMessenger.Client/PWAMessenger.Client.csproj -c Release -o publish

      - name: Inject API base URL
        run: |
          echo '{ "ApiBaseUrl": "${{ secrets.API_BASE_URL }}" }' \
            > publish/wwwroot/appsettings.json

      - name: Create stable dotnet.js alias (.NET 10 fingerprints runtime files but blazor.webassembly.js imports the stable name)
        run: |
          DOTNET_JS=$(ls publish/wwwroot/_framework/dotnet.*.js | grep -v native | grep -v runtime | head -1)
          cp "$DOTNET_JS" publish/wwwroot/_framework/dotnet.js

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: pwamessenger
          directory: publish/wwwroot
